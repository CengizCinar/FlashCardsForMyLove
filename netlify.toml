[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# SPA routing — sadece API olmayan istekler için
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200
  force  = false

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
